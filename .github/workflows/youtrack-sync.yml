name: Sync GitHub Issues with YouTrack

on:
  issues:
    types: [closed, reopened]

jobs:
  sync-to-youtrack:
    runs-on: ubuntu-latest
    env:
      # Bezpieczne przekazanie danych do środowiska
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
    steps:
      - name: Update YouTrack Issue
        run: |
          # 1. Wyodrębnienie idReadable (SPO-XXX)
          ISSUE_ID=$(echo "$ISSUE_TITLE $ISSUE_BODY" | grep -oE 'SPO-[0-9]+' | head -1)
          
          if [ -z "$ISSUE_ID" ]; then
            echo "Brak ID YouTracka (SPO-XXX) w tytule lub opisie. Przerywam operację."
            exit 0
          fi

          # 2. Ustalenie komendy na podstawie akcji na GitHubie
          if [ "${{ github.event.action }}" = "closed" ]; then
            COMMAND="State Fixed" # Zmień "Fixed", jeśli używacie "Done" lub "Resolved"
          elif [ "${{ github.event.action }}" = "reopened" ]; then
            COMMAND="State Open"  # Zmień "Open", jeśli używacie np. "In Progress"
          fi

          echo "Aplikowanie komendy '$COMMAND' do zadania $ISSUE_ID..."

          # 3. Wysłanie żądania do YouTrack API (z idReadable i flagą -f dla wyłapywania błędów HTTP)
          curl -f -s -X POST "${{ secrets.YOUTRACK_URL }}/api/commands" \
            -H "Authorization: Bearer ${{ secrets.YOUTRACK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"$COMMAND\", \"issues\": [{\"idReadable\": \"$ISSUE_ID\"}]}"
